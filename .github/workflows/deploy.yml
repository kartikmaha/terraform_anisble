name: Force Reset Deploy (Destroy + Recreate + Ansible)

on:
  push:
    branches:
      - main
      - dev
      - stg

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_DIR: terraform

    steps:

    # ----------------------------
    # CHECKOUT CODE
    # ----------------------------
    - name: Checkout Code
      uses: actions/checkout@v3

    # ----------------------------
    # SET ENV
    # ----------------------------
    - name: Set Environment
      run: |
        if [[ "${GITHUB_REF##*/}" == "main" ]]; then
          echo "ENV=prd" >> $GITHUB_ENV
        elif [[ "${GITHUB_REF##*/}" == "stg" ]]; then
          echo "ENV=stg" >> $GITHUB_ENV
        else
          echo "ENV=dev" >> $GITHUB_ENV
        fi

    # ----------------------------
    # AWS LOGIN
    # ----------------------------
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # ----------------------------
    # FORCE IAM CLEANUP
    # ----------------------------
    - name: Force Cleanup IAM (handles stuck roles)
      run: |
        echo "Cleaning IAM..."

        # Try removing role from instance profile
        aws iam remove-role-from-instance-profile \
          --instance-profile-name terraform-ansible-${ENV}-profile \
          --role-name terraform-ansible-${ENV}-ec2-role || true

        # Delete instance profile
        aws iam delete-instance-profile \
          --instance-profile-name terraform-ansible-${ENV}-profile || true

        # Delete role
        aws iam delete-role \
          --role-name terraform-ansible-${ENV}-ec2-role || true

    # ----------------------------
    # TERRAFORM SETUP
    # ----------------------------
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # ----------------------------
    # TERRAFORM INIT
    # ----------------------------
    - name: Terraform Init
      run: |
        cd $TF_DIR
        terraform init

    # ----------------------------
    # FORCE DESTROY INFRA
    # ----------------------------
    - name: Terraform Destroy (Force Reset)
      run: |
        cd $TF_DIR
        terraform destroy -auto-approve -var-file=envs/${ENV}.tfvars || true

    # ----------------------------
    # CLEAN UNUSED VPCs (OPTIONAL HARD CLEAN)
    # ----------------------------
    - name: Cleanup Old VPCs (optional)
      run: |
        echo "Cleaning old VPCs (best effort)..."
        VPCS=$(aws ec2 describe-vpcs --query "Vpcs[*].VpcId" --output text)
        for vpc in $VPCS; do
          aws ec2 delete-vpc --vpc-id $vpc || true
        done

    # ----------------------------
    # CREATE NEW INFRA
    # ----------------------------
    - name: Terraform Apply
      run: |
        cd $TF_DIR
        terraform apply -auto-approve -var-file=envs/${ENV}.tfvars

    # ----------------------------
    # INSTALL JQ
    # ----------------------------
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    # ----------------------------
    # GET EC2 IP
    # ----------------------------
    - name: Get EC2 IP
      run: |
        cd $TF_DIR
        IP=$(terraform output -json instance_ip | jq -r '.')
        echo "EC2_IP=$IP" >> $GITHUB_ENV

    # ----------------------------
    # SETUP SSH KEY
    # ----------------------------
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY }}" > ~/.ssh/key.pem
        chmod 600 ~/.ssh/key.pem

    # ----------------------------
    # INSTALL ANSIBLE
    # ----------------------------
    - name: Install Ansible
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible

    # ----------------------------
    # CREATE INVENTORY
    # ----------------------------
    - name: Create Inventory
      run: |
        mkdir -p ansible/inventories
        echo "[web]" > ansible/inventories/${ENV}
        echo "$EC2_IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/key.pem ansible_python_interpreter=/usr/bin/python3" >> ansible/inventories/${ENV}

    # ----------------------------
    # RUN ANSIBLE
    # ----------------------------
    - name: Run Ansible Playbook
      run: |
        cd ansible
        ansible-playbook -i inventories/${ENV} playbooks/site.yml

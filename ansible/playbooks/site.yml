---
- name: Bootstrap EC2 (Install Python)
  hosts: web
  become: true
  gather_facts: false

  tasks:
    - name: Install Python (Amazon Linux)
      raw: sudo yum install -y python3

- name: Deploy Application using Ansible
  hosts: web
  become: true

  vars:
    app_dir: /home/ec2-user/app
    docker_image: myapp
    container_name: myapp
    app_port: 80

  roles:
    - app-role

---
- name: Bootstrap and Deploy Application
  hosts: web
  become: true
  # Global fix: Disable fact gathering to prevent the JSON/Zip crash
  gather_facts: false 

  vars:
    ansible_python_interpreter: /usr/bin/python3
    app_dir: /home/ec2-user/app
    docker_image: myapp
    container_name: myapp
    app_port: 80

  tasks:
    # 1. Ensure Python is present for Ansible modules to run
    - name: Install Python 3 requirements
      raw: |
        sudo yum install -y python3 python3-pip python3-libselinux
      register: bootstrap_out
      changed_when: true

    # 2. Fix the pathing
    - name: Set Python symlink
      raw: sudo ln -sf /usr/bin/python3 /usr/bin/python
      changed_when: true

    # 3. Deploy your application
    # We use include_role and explicitly tell it not to gather facts
    - name: Deploy Application Role
      include_role:
        name: app-role
      vars:
        # Ensures the role inherits the 'no facts' setting
        render_facts: false

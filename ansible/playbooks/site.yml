---
# PLAY 1: Connection Check
- name: Wait for EC2 SSH to be ready
  hosts: web_servers
  gather_facts: false
  tasks:
    - name: Ensure port 22 is reachable
      ansible.builtin.wait_for:
        port: 22
        host: "{{ inventory_hostname }}"
        search_regex: OpenSSH
        delay: 15
        timeout: 300
      delegate_to: localhost

# PLAY 2: Infrastructure Configuration
- name: Configure Web Server and Deploy App
  hosts: web_servers
  become: true
  # CRITICAL: Keep this false to bypass the Python SyntaxError in the setup module
  gather_facts: false 
  
  vars:
    # Double-down on the interpreter here as well
    ansible_python_interpreter: /usr/bin/python3
    app_port: 80 
    docker_image: "kartikmaha/terraform_anisble:latest"

  tasks:
    - name: Install Docker
      ansible.builtin.dnf:
        name: docker
        state: present
        update_cache: true

    - name: Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: true

    - name: Reset connection to apply group changes
      ansible.builtin.meta: reset_connection

    - name: Pull and run Flask App from Docker Hub
      community.docker.docker_container:
        name: flask_app
        image: "{{ docker_image }}"
        state: started
        restart_policy: always
        published_ports:
          - "{{ app_port }}:3000"

    # ... (rest of your tasks remain the same)

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

    - name: Reset connection to apply group changes
      ansible.builtin.meta: reset_connection

    - name: Pull and run Flask App from Docker Hub
      community.docker.docker_container:
        name: flask_app
        image: "{{ docker_image }}"
        state: started
        restart_policy: always
        published_ports:
          - "{{ app_port }}:3000"

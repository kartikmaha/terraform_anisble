---
- name: Bootstrap and Deploy Application
  hosts: web
  become: true
  gather_facts: false 

  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_pkg_mgr: yum
    app_dir: /home/ec2-user/app
    docker_image: myapp
    container_name: myapp
    app_port: 80

  tasks:
    # --- STAGE 1: BOOTSTRAP SYSTEM ---
    - name: Install Python 3 and Core Tools (Raw)
      raw: |
        sudo yum install -y python3 python3-pip python3-libselinux docker git
      changed_when: true

    - name: Set Python symlink
      raw: sudo ln -sf /usr/bin/python3 /usr/bin/python
      changed_when: true

    - name: Reset connection
      meta: reset_connection

    # --- STAGE 2: VERIFY TOOLS ---
    - name: Verify Docker is installed
      raw: docker --version
      register: docker_check

    # --- STAGE 3: RUN REMAINING ROLE TASKS ---
    - name: Deploy Application Role
      include_role:
        name: app-role

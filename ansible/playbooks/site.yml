---
- name: Bootstrap EC2 (Install Python properly)
  hosts: web
  become: true
  gather_facts: false

  tasks:
    - name: Install Python + dependencies
      raw: |
        sudo yum install -y python3 python3-pip python3-libselinux

    - name: Set Python symlink
      raw: |
        sudo ln -sf /usr/bin/python3 /usr/bin/python

- name: Deploy Application using Ansible
  hosts: web
  become: true

  vars:
    app_dir: /home/ec2-user/app
    docker_image: myapp
    container_name: myapp
    app_port: 80

  roles:
    - app-role

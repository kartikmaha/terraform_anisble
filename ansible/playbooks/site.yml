---
# PLAY 1: Connection Verification
- name: Wait for EC2 SSH to be ready
  hosts: web_servers
  gather_facts: false
  tasks:
    - name: Ensure port 22 is reachable
      ansible.builtin.wait_for:
        port: 22
        host: "{{ ansible_host }}"
        search_regex: OpenSSH
        delay: 15        # Wait 15s before first check
        timeout: 300     # Fail after 5 mins
      delegate_to: localhost

# PLAY 2: Infrastructure Configuration
- name: Configure Web Server and Deploy App
  hosts: web_servers
  become: true
  gather_facts: true     # Now safe to gather facts
  
  vars:
    # Match the port in your prd.tfvars
    app_port: 80 

  tasks:
    - name: Update all packages
      dnf:
        name: "*"
        state: latest
        update_cache: true

    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

    - name: Pull and run Flask App from Docker Hub
      # Replace with your actual image name if using Docker Hub
      community.docker.docker_container:
        name: flask_app
        image: "{{ docker_image | default('python:3.9-slim') }}"
        state: started
        restart_policy: always
        published_ports:
          - "{{ app_port }}:{{ app_port }}"
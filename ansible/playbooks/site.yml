---
- name: Bootstrap and Deploy Application
  hosts: web
  become: true
  # We must keep this false so Ansible doesn't try to use Python 
  # before we have finished installing it.
  gather_facts: false 

  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_pkg_mgr: yum
    app_dir: /home/ec2-user/app
    docker_image: myapp
    container_name: myapp
    app_port: 80

  tasks:
    # ----------------------------------------------------------------
    # STAGE 1: RAW BOOTSTRAP (No Python Required)
    # ----------------------------------------------------------------
    - name: Clean and Install Python 3 requirements
      raw: |
        sudo yum install -y python3 python3-pip python3-libselinux
      register: bootstrap_out
      changed_when: true

    - name: Set Python symlink
      raw: sudo ln -sf /usr/bin/python3 /usr/bin/python
      changed_when: true

    # ----------------------------------------------------------------
    # STAGE 2: THE REFRESH (The Secret Sauce)
    # ----------------------------------------------------------------
    - name: Reset connection to refresh environment
      meta: reset_connection
      # This forces Ansible to close the current SSH session and 
      # open a new one. The new session will correctly use the 
      # /usr/bin/python3 interpreter and its libraries.

    # ----------------------------------------------------------------
    # STAGE 3: ROLE EXECUTION
    # ----------------------------------------------------------------
    - name: Deploy Application Role
      include_role:
        name: app-role
